name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Determine Release Tag
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=dev-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Fetch Original Binaries
        run: |
          curl -L -o dnstt-server-linux-amd64 https://github.com/anonvector/slipgate/releases/latest/download/dnstt-server-linux-amd64
          curl -L -o dnstt-server-linux-arm64 https://github.com/anonvector/slipgate/releases/latest/download/dnstt-server-linux-arm64
          curl -L -o caddy-naive-linux-amd64 https://github.com/anonvector/slipgate/releases/latest/download/caddy-naive-linux-amd64
          curl -L -o caddy-naive-linux-arm64 https://github.com/anonvector/slipgate/releases/latest/download/caddy-naive-linux-arm64
          curl -L -o slipstream-server-linux-amd64 https://github.com/anonvector/slipgate/releases/latest/download/slipstream-server-linux-amd64
          curl -L -o slipstream-server-linux-arm64 https://github.com/anonvector/slipgate/releases/latest/download/slipstream-server-linux-arm64
          
      - name: Build Binaries
        run: |
          # Ensure dependencies are fetched and tidied
          go mod tidy
          
          # Use the repository's Makefile to build the binaries
          make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          prerelease: ${{ startsWith(env.RELEASE_TAG, 'dev-') }}
          files: |
            slipgate-*
            dnstt-server-*
            slipstream-server-*
            caddy-naive-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
